# Production stack for a single-VM Enlight ITSM deployment.
#
# Runs three containers:
#   • postgres — PostgreSQL 16 with the pgvector extension (knowledge base search)
#   • redis    — BullMQ job queue + caching
#   • app      — the Enlight image (API + worker), built from source on first boot
#
# The deploy tool clones github.com/rbacon4/enlight-itsm into ./enlight-itsm so the
# `app` service can build it. Configuration comes from the .env file in this dir.

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-enlight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-enlight}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-enlight}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./enlight-itsm
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file: .env
    ports:
      - "${HTTP_PORT:-80}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
