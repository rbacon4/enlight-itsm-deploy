# Production stack for a single-VM Enlight ITSM deployment.
#
# Containers:
#   • caddy    — reverse proxy + automatic HTTPS (Let's Encrypt) when a domain is set
#   • app      — the Enlight image (API + worker), built from source on first boot
#   • postgres — PostgreSQL 16 with the pgvector extension (knowledge base search)
#   • redis    — BullMQ job queue
#
# Caddy is the entry point on ports 80/443. It reads SITE_ADDRESS from .env:
#   • a domain (e.g. itsm.acme.com) → Caddy auto-issues a TLS cert and serves HTTPS
#   • ":80" (the default when no domain) → Caddy serves plain HTTP
# Either way the app itself only listens internally on app:3000.

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-enlight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-enlight}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-enlight}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./enlight-itsm
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file: .env
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Domain for auto-HTTPS, or ":80" for plain HTTP. Set by the deploy tool.
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
